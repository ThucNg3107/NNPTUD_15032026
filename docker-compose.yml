services:
  mongo:
    container_name: nnptud-c3-mongo
    image: ${MONGO_IMAGE:-mongo:7}
    environment:
      - MONGO_INITDB_DATABASE=NNPTUD-C3
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    tmpfs:
      - /data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
